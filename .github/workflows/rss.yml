name: Build RSS Feed

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build feed
        run: python scripts/build.py

      - name: Commit & push
        run: |
          git config --global user.name "rss-bot"
          git config --global user.email "rss@bot.com"
          git add docs/feed.xml
          git commit -m "update feed" || echo "no changes"
          git push
